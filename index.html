<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATH | Advanced Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #050505; --surface: #0f0f11; --surface-hover: #1a1a1d;
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.15);
            --accent: #ffffff; --muted: #8b8b93; --border: rgba(255, 255, 255, 0.06);
            --radius: 12px; --font-main: 'Plus Jakarta Sans', sans-serif; --success: #10b981; --warn: #f59e0b;
        }
        [data-theme="light"] {
            --bg: #f3f4f6; --surface: #ffffff; --surface-hover: #f9fafb;
            --accent: #111827; --muted: #6b7280; --border: rgba(0, 0, 0, 0.1); --primary: #4f46e5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg); color: var(--accent); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            background-image: linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; transition: background-color 0.3s;
        }

        /* --- Navigation --- */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px); z-index: 100; position: relative;
        }

        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.4rem; color: white; }
        .brand-icon { width: 32px; height: 32px; background: var(--primary); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Times New Roman', serif; font-size: 1.4rem; box-shadow: 0 0 20px var(--primary-glow); }
        .brand span { color: var(--muted); font-weight: 500; font-size: 1rem; margin-left: 4px; display: none; }

        .header-controls { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

        /* --- Main Layout (Auto-Arranging Grid) --- */
        .portal-container {
            display: grid;
            /* Desktop: 1fr (Player) 340px (Sidebar) */
            /* Mobile: 1fr (Stack) */
            grid-template-columns: 1fr 340px; 
            flex-grow: 1; overflow: hidden; position: relative; height: calc(100vh - 60px);
        }

        /* --- Video Stage --- */
        .video-stage { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .player-wrapper {
            position: relative; width: 100%; max-width: 100%; padding-bottom: 56.25%; height: 0;
            background: #000; border-radius: var(--radius);
            box-shadow: 0 25px 60px -10px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .player-wrapper #main-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Skeleton Loader (Must disappear on Play) */
        .skeleton-loader { position: absolute; inset: 0; background: #111; z-index: 10; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .video-details { width: 100%; max-width: 100%; margin-top: 20px; position: relative; }
        .video-details.unavailable { text-align: center; padding: 40px; }
        .video-details h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; line-height: 1.2; }
        .video-details p { color: var(--muted); max-width: 800px; line-height: 1.6; font-size: 1rem; }

        /* --- Sidebar (Playlist & Scroll) --- */
        .sidebar {
            background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
            position: relative; z-index: 90;
        }
        .sidebar-header { padding: 15px 24px 10px; font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; background: rgba(0,0,0,0.2); }
        .search-box { padding: 10px 24px; }
        .search-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; font-size: 0.9rem; }
        .search-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        /* Scrollable Playlist Area */
        .playlist-container { overflow-y: auto; flex: 1; padding-bottom: 60px; }

        .cat-header { padding: 12px 24px; font-size: 0.85rem; font-weight: 600; color: var(--primary); cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: rgba(99, 102, 241, 0.05); }
        .cat-content { display: none; padding: 5px 0; }
        .cat-content.open { display: block; }
        
        .playlist-item { padding: 12px 24px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all 0.2s ease; display: flex; gap: 12px; align-items: center; position: relative; }
        .playlist-item:hover { background: rgba(255,255,255,0.02); }
        .playlist-item.active { background: rgba(99, 102, 241, 0.05); border-left: 3px solid var(--primary); }
        
        .progress-bar { position: absolute; left: 0; bottom: 0; height: 2px; background: var(--success); transition: width 0.3s; }
        .thumbnail-mini { width: 90px; height: 55px; background: #222; border-radius: 6px; flex-shrink: 0; background-size: cover; background-position: center; border: 1px solid var(--border); position: relative; }
        .item-info { flex: 1; }
        .item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; display: block; line-height: 1.3; color: #e1e1e1; }
        .playlist-item.active .item-title { color: var(--primary); }
        .item-meta { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }

        /* --- Notes & Clean Interface --- */
        /* Removed the big buttons from main stage, moved to settings */
        .notes-section { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; margin-top: 20px; }
        .notes-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .notes-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .notes-actions { display: flex; gap: 8px; }
        .notes-btn { background: transparent; border: none; color: var(--primary); cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .notes-btn:hover { text-decoration: underline; }
        #notes-input { width: 100%; min-height: 120px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); padding: 16px; font-family: 'Courier New', monospace; resize: vertical; font-size: 0.95rem; line-height:1.5; transition: border 0.3s; }
        #notes-input:focus { border-color: var(--primary); outline: none; }

        /* --- Settings Modal (Clutter Solution) --- */
        .settings-modal {
            display: none; position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--surface); border-left: 1px solid var(--border);
            box-shadow: -5px 0 20px rgba(0,0,0,0.2); z-index: 200;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%); overflow-y: auto;
        }
        .settings-modal.open { transform: translateX(0); }
        
        .settings-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .settings-title { font-weight: 700; font-size: 1.1rem; }
        .settings-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); }
        .settings-content { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
        .setting-group { display: flex; flex-direction: column; gap: 12px; }
        .setting-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .set-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .set-btn:hover { opacity: 0.9; }
        .set-btn-outline { background: transparent; border: 1px solid var(--border); color: var(--accent); }
        .set-btn-outline:hover { background: rgba(255,255,255,0.05); }
        .set-full { width: 100%; }
        .input-group { display: flex; gap: 8px; }
        .set-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .brand span { display: inline; }
            .badge-header { display: inline-block; }
            .portal-container { grid-template-columns: 1fr 280px; } /* Tighter sidebar on tablet */
        }

        @media (max-width: 768px) {
            .portal-container { display: block; overflow: visible; } /* Stack on mobile */
            .sidebar {
                position: fixed; top: 60px; right: 0; bottom: 0; width: 100%; z-index: 1000;
                transform: translateY(100%); border-left: 1px solid var(--border);
                transition: transform 0.3s ease;
            }
            .sidebar.open { transform: translateY(0); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; }
            .sidebar-overlay.active { display: block; }
            
            .video-stage { padding: 0; height: auto; flex: 1; overflow: hidden; }
            .player-wrapper { border-radius: 0; border: none; padding-bottom: 56.25%; }
            .brand span { display: none; }
            
            /* Settings Modal becomes full screen overlay on mobile */
            .settings-modal { width: 100%; height: auto; top: auto; left: 0; border: none; z-index: 2000; }
            .settings-modal.open { transform: translateY(0); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="brand">
            <div class="brand-icon">∑</div>
            <div>MATH <span>ADVANCED</span></div>
        </div>
    </div>
    <div class="header-controls">
        <div class="badge-header">Grade 11 • Mathematics</div>
        
        <!-- Mobile Menu Toggle -->
        <button class="icon-btn" onclick="app.toggleSidebar()" style="display: none;" id="mobile-menu-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <!-- Settings Toggle (Gear) -->
        <button class="icon-btn" onclick="app.toggleSettings()" title="Settings">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82l-3.43-3.43a1.65 1.65 0 0 0-2.34 0L12 11.65 11.65 0 0 0-2.34 0zM12 12.88V8.12a1.65 1.65 0 0 0-1.65-1.65h-3.33v6.25c0 1.34.35 1.65 1.65 0 2.99-1.24V12.88z"/></svg>
        </button>

        <button class="icon-btn" onclick="app.toggleTheme()" title="Theme">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
    </div>
</header>

<!-- Mobile Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="app.toggleSidebar()"></div>

<div class="portal-container">
    <main class="video-stage">
        <div class="player-wrapper">
            <!-- FIXED: Skeleton Overlay removed from container, handled by JS -->
            <div id="skeleton" class="skeleton-loader">
                <div class="spinner"></div>
            </div>
            <div id="main-player"></div>
        </div>
        
        <div class="video-details" id="video-details">
            <!-- Clean UI: Removed Resume and Share buttons from here -->
            <h1 id="active-title">Select a Lesson</h1>
            <p id="active-desc">Browse list on the right to start learning.</p>
            
            <!-- Notes Section (Clean) -->
            <div class="notes-section">
                <div class="notes-header">
                    <div class="notes-title">My Notes</div>
                    <div class="notes-actions">
                        <button class="notes-btn" onclick="app.insertTimestamp()">⏱ Time</button>
                        <button class="notes-btn" onclick="app.clearNotes()">Clear</button>
                        <button class="notes-btn" onclick="app.downloadNotes()">Export</button>
                    </div>
                </div>
                <textarea id="notes-input" placeholder="Type your notes here... (Auto-saved)"></textarea>
            </div>
        </div>
    </main>

    <aside class="sidebar" id="sidebar">
        <!-- Smart Import (Inside Settings Logic handled in Modal) -->
        <!-- Kept simple import for quick access here -->
        <div class="sidebar-header">Curriculum</div>
        <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Search lessons...">
        </div>
        <div class="playlist-container" id="playlist-container">
            <!-- Dynamic -->
        </div>
    </aside>
</div>

<!-- Settings Modal (The "Clean" Solution) -->
<div class="settings-modal" id="settings-modal">
    <div class="settings-header">
        <div class="settings-title">Settings</div>
        <button class="settings-close" onclick="app.toggleSettings()">×</button>
    </div>
    <div class="settings-content">
        <!-- Share Section -->
        <div class="setting-group">
            <div class="setting-label">Share Lesson</div>
            <div style="display:flex; gap:8px;">
                <button class="set-btn set-full" onclick="app.copyLink()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Copy Link
                </button>
                <button class="set-btn set-full" onclick="app.shareWhatsapp()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.472 14.382c-.297-.149-1.758-.837-2.659.822-2.659.823-1.758.824-2.659c1.127 0-2.491.335-3.23 1.097-.472 2.165-.822 2.659-1.399 4.23-2.659 4.23-4.23 0-1.127 0-2.491-.335-3.23-1.097-.472-2.165-.822-2.659 1.399-4.23 2.659-4.23 0 1.127 0 2.491.335 3.23 1.097.472 2.165.822 2.659 1.399 4.23 2.659 4.23 0-1.127 0 2.491-.335 3.23-1.097-.472-2.165-.822-2.659-.824-2.659c1.128 0-2.491.335-3.23 1.097-.472 2.165-.822 2.659 1.399 4.23 2.659 4.23 0 1.127 0 2.491.335 3.23 1.097.472 2.165.822 2.659.824 2.659zM2.631 13.234v-2.647h1.068c0-1.489.552-2.831 1.462-3.795.908-3.795.908-2.831 1.462-3.795 2.631 0-.735 0-1.369-.262-1.906-.908-2.903-1.368-2.903-.908-2.903zm-4.416 2.659h-1.068v-2.647c0-1.489.552-2.831 1.462-3.795.908-3.795.908-2.831 1.462-3.795 2.631 0-.735 0-1.369-.262-1.906-.908-2.903-1.368-2.903-.908-2.903zm4.416 2.659h1.068v2.647c0 1.489-.552 2.831-1.462 3.795-.908 3.795-.908 2.831-1.462 3.795-2.631 0 .735 0 1.369.262 1.906.908 2.903 1.368 2.903.908 2.903z"/></svg> WhatsApp
                </button>
            </div>
        </div>

        <!-- QR Code -->
        <div class="setting-group">
            <div class="setting-label">QR Code</div>
            <div id="qrcode" style="background: white; padding: 10px; border-radius: 8px; display: flex; justify-content: center;"></div>
        </div>

        <!-- Import Section -->
        <div class="setting-group">
            <div class="setting-label">Import Video</div>
            <div class="input-group">
                <input type="text" id="import-url" class="set-input" placeholder="Paste Link...">
                <button class="set-btn" onclick="app.importSingle()">Add</button>
            </div>
        </div>

        <!-- Data Management -->
        <div class="setting-group">
            <div class="setting-label">Data Manager</div>
            <div style="display:flex; gap:8px;">
                <button class="set-btn set-full set-btn-outline" onclick="app.exportData()">💾 Backup Data</button>
                <button class="set-btn set-full set-btn-outline" onclick="document.getElementById('file-import').click()">📂 Restore</button>
                <input type="file" id="file-import" style="display:none;" onchange="app.importData(this)">
            </div>
        </div>

        <!-- Resume Watching -->
        <div class="setting-group">
            <div class="setting-label">Resume Watching</div>
            <button class="set-btn set-full" onclick="app.resumeWatching()" id="resume-btn">Jump to Last Position</button>
        </div>
    </div>
</div>

<script>
    // ==== HARDCODED LIST ====
    const defaultLessons = [
        { id: "fbZWRiV1wkc", title: "Number Systems", category: "Foundations", desc: "Understanding real numbers, integers, and number sets.", thumb: "https://img.youtube.com/vi/fbZWRiV1wkc/mqdefault.jpg", channel: "Unknown" },
        { id: "0OPdetFucTU", title: "Algebraic Identities", category: "Algebra", desc: "Mastering indices, powers, and expansion formulas.", thumb: "https://img.youtube.com/vi/0OPdetFucTU/mqdefault.jpg", channel: "Unknown" },
        { id: "9ZmkBIwlWrA", title: "Advanced Algebra", category: "Algebra", desc: "Complex quadratic equations and inequalities.", thumb: "https://img.youtube.com/vi/9ZmkBIwlWrA/mqdefault.jpg", channel: "Unknown" },
        { id: "JOVXMSJy3CQ", title: "Calculus Limits", category: "Calculus", desc: "Limits and derivatives.", thumb: "https://img.youtube.com/vi/JOVXMSJy3CQ/mqdefault.jpg", channel: "Unknown" },
        { id: "VUm3AZffkto", title: "Geometry Basics", category: "Geometry", desc: "Properties of triangles, circles, and polygons.", thumb: "https://img.youtube.com/vi/VUm3AZffkto/mqdefault.jpg", channel: "Unknown" },
        { id: "3LaUDn3eMRA", title: "Vector Algebra", category: "Vectors", desc: "Magnitude, direction, and dot products.", thumb: "https://img.youtube.com/vi/3LaUDn3eMRA/mqdefault.jpg", channel: "Unknown" },
        { id: "P-jyp-CdFfo", title: "Logarithmic Functions", category: "Functions", desc: "Laws of logarithms and their applications.", thumb: "https://img.youtube.com/vi/P-jyp-CdFfo/mqdefault.jpg", channel: "Unknown" },
        { id: "VyZ0iRwsVbQ", title: "Radian & Degree", category: "Trigonometry", desc: "Angular measurement systems and conversion.", thumb: "https://img.youtube.com/vi/VyZ0iRwsVbQ/mqdefault.jpg", channel: "Unknown" },
        { id: "1NSNJxJq3XY", title: "Probability", category: "Statistics", desc: "Basics of chance and theoretical probability.", thumb: "https://img.youtube.com/vi/1NSNJxJq3XY/mqdefault.jpg", channel: "Unknown" },
        { id: "0aC6sBc5Q-A", title: "Statistics", category: "Statistics", desc: "Mean, mode, median.", thumb: "https://img.youtube.com/vi/0aC6sBc5Q-A/mqdefault.jpg", channel: "Unknown" },
        { id: "1-GvYG1p0iI", title: "Graphing", category: "Graphing", desc: "Plotting linear and quadratic equations.", thumb: "https://img.youtube.com/vi/1-GvYG1p0iI/mqdefault.jpg", channel: "Unknown" },
        { id: "8Z3Gz4DT7X8", title: "Number Theory", category: "Foundations", desc: "Prime numbers and factors.", thumb: "https://img.youtube.com/vi/8Z3Gz4DT7X8/mqdefault.jpg", channel: "Unknown" },
        { id: "NGkOTBhmuUM", title: "Trigonometry", category: "Trigonometry", desc: "Core concepts: Sin, Cos, Tan and identities.", thumb: "https://img.youtube.com/vi/NGkOTBhmuUM/mqdefault.jpg", channel: "Unknown" }
    ];

    // ==== DATA STORE ====
    const store = {
        lessons: JSON.parse(localStorage.getItem('saved_lessons')) || defaultLessons,
        saveLessons() { localStorage.setItem('saved_lessons', JSON.stringify(this.lessons)); },
        getProgress(id) { return parseInt(localStorage.getItem('progress_' + id) || '0'); },
        setProgress(id, val) { localStorage.setItem('progress_' + id, val); },
        getResume(id) { return parseInt(localStorage.getItem('resume_' + id) || '0'); },
        setResume(id, val) { localStorage.setItem('resume_' + id, val); },
        getNotes(id) { return localStorage.getItem('notes_' + id) || ''; },
        setNotes(id, val) { localStorage.setItem('notes_' + id, val); },
        saveHistory(v) { 
            let h = JSON.parse(localStorage.getItem('watch_history')) || []; h = h.filter(x => x.id !== v.id); h.unshift(v); localStorage.setItem('watch_history', JSON.stringify(h));
        }
    };

    // ==== YOUTUBE PLAYER WRAPPER ====
    let player; let currentVideoId = null; let currentVideoIndex = 0;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('main-player', {
            height: '100%', width: '100%',
            playerVars: { 'playsinline': 1, 'rel': 0 },
            events: {
                'onReady': app.onPlayerReady,
                'onStateChange': app.onPlayerStateChange
            }
        });
    }
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // ==== APP LOGIC ====
    const app = {
        init() {
            // Sync saved lessons
            const savedIds = store.lessons.map(l => l.id);
            const newItems = defaultLessons.filter(d => !savedIds.includes(d.id));
            if (newItems.length > 0) {
                store.lessons = [...store.lessons, ...newItems];
                store.saveLessons();
            }

            const theme = localStorage.getItem('theme');
            if (theme) document.body.setAttribute('data-theme', theme);

            // Listeners
            document.getElementById('search-input').addEventListener('input', (e) => app.renderPlaylist(e.target.value));
            document.getElementById('notes-input').addEventListener('input', (e) => store.setNotes(currentVideoId, e.target.value));
            window.addEventListener('keydown', app.handleKeydown);
            window.addEventListener('popstate', app.handleRoute);
            
            if (window.innerWidth <= 768) document.getElementById('mobile-menu-btn').style.display = 'flex';
            
            // Initialize QR Code in settings
            if(currentVideoId) app.updateQR(currentVideoId);
            
            app.handleRoute();
        },

        handleRoute() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                const idx = store.lessons.findIndex(l => l.id === id);
                if (idx !== -1) {
                    app.loadVideo(idx, false);
                } else {
                    app.showUnavailable(id);
                }
            } else {
                app.renderPlaylist();
                app.loadVideo(0, false);
            }
        },

        loadVideo(index, updateUrl = true) {
            if (index < 0 || index >= store.lessons.length) return;
            const video = store.lessons[index];
            currentVideoId = video.id;
            currentVideoIndex = index;

            if (updateUrl) {
                const newUrl = `${window.location.pathname}?id=${video.id}`;
                window.history.pushState({ path: newUrl }, '', newUrl);
            }

            // Hide Unavailable UI
            document.getElementById('video-details').style.display = 'block';

            document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`vid-${index}`);
            if (activeEl) activeEl.classList.add('active');

            // Show Skeleton immediately
            app.showSkeleton(true);

            // Load in API
            if (player && player.loadVideoById) {
                player.loadVideoById(video.id);
                const savedTime = store.getResume(video.id);
                if (savedTime > 0) setTimeout(() => player.seekTo(savedTime), 500);
            } else {
                document.querySelector('#main-player').innerHTML = `<iframe src="https://www.youtube.com/embed/${video.id}?rel=0" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }

            document.getElementById('active-title').innerText = video.title;
            document.getElementById('active-desc').innerText = video.desc;
            document.getElementById('notes-input').value = store.getNotes(video.id);
            document.getElementById('resume-btn').style.display = store.getResume(video.id) > 10 ? 'block' : 'none';
            
            // Update QR
            app.updateQR(video.id);
            
            store.saveHistory(video);

            if (window.innerWidth <= 768) document.querySelector('.sidebar').classList.remove('open');
        },

        onPlayerReady(event) { if (!currentVideoId) app.handleRoute(); },

        // --- FIX 1: HIDE SKELETON ON PLAY ---
        onPlayerStateChange(event) {
            if (!currentVideoId) return;
            
            // The Logic to kill the loading overlay
            if (event.data === YT.PlayerState.PLAYING) {
                app.showSkeleton(false);
            }

            if (event.data === YT.PlayerState.PLAYING) {
                // Progress Logic
                if (app.progressInterval) clearInterval(app.progressInterval); // Memory leak fix
                app.progressInterval = setInterval(() => {
                    if (player && player.getCurrentTime) {
                        const duration = player.getDuration();
                        const current = player.getCurrentTime();
                        if (duration > 0) {
                            const pct = Math.floor((current / duration) * 100);
                            store.setProgress(currentVideoId, pct);
                            store.setResume(currentVideoId, current);
                            app.updateProgressUI(currentVideoId, pct);
                            document.getElementById('resume-btn').style.display = 'block';
                        }
                    }
                }, 2000);
            } else {
                if (app.progressInterval) clearInterval(app.progressInterval);
            }

            if (event.data === YT.PlayerState.ENDED) {
                app.loadVideo(currentVideoIndex + 1);
            }
        },

        // --- FEATURES ====
        showSkeleton(show) { document.getElementById('skeleton').style.display = show ? 'flex' : 'none'; },
        
        toggleSettings() { document.getElementById('settings-modal').classList.toggle('open'); },
        
        updateQR(id) {
            const container = document.getElementById('qrcode');
            container.innerHTML = "";
            if(id) {
                new QRCode(container, { text: `${window.location.origin}${window.location.pathname}?id=${id}`, width: 150, height: 150 });
            }
        },

        renderPlaylist(filter = '') {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            const term = filter.toLowerCase();
            
            const filtered = store.lessons.filter(l => 
                l.title.toLowerCase().includes(term) || l.desc.toLowerCase().includes(term) || l.category.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted)">No lessons found</div>`;
                return;
            }

            const categories = [...new Set(filtered.map(l => l.category))];
            categories.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.innerHTML = `<div class="cat-header" onclick="this.nextElementSibling.classList.toggle('open')">${cat} <span>▼</span></div><div class="cat-content open"></div>`;
                container.appendChild(catDiv);
                const content = catDiv.querySelector('.cat-content');
                
                filtered.filter(l => l.category === cat).forEach(video => {
                    const idx = store.lessons.indexOf(video);
                    const progress = store.getProgress(video.id);
                    
                    const el = document.createElement('div');
                    el.id = `vid-${idx}`;
                    el.className = 'playlist-item';
                    el.innerHTML = `
                        <div class="progress-bar" style="width: ${progress}%"></div>
                        <div class="thumbnail-mini" style="background-image: url('${video.thumb}')"></div>
                        <div class="item-info">
                            <div class="item-title">${video.title}</div>
                            <div class="item-meta">${progress > 80 ? '✅ Done' : progress + '%'}</div>
                        </div>
                    `;
                    el.onclick = () => app.loadVideo(idx);
                    content.appendChild(el);
                });
            });
        },

        updateProgressUI(id, pct) {
            const idx = store.lessons.findIndex(l => l.id === id);
            const el = document.getElementById(`vid-${idx}`);
            if (el) {
                el.querySelector('.progress-bar').style.width = pct + '%';
                el.querySelector('.item-meta').innerText = (pct > 80 ? '✅ Done' : pct + '%');
            }
        },

        // Settings & Utils
        importSingle: async () => {
            const input = document.getElementById('import-url');
            const url = input.value.trim();
            if (!url) return;
            const id = url.match(/(?:v=|list=)([a-zA-Z0-9_-]+)/)?.[1];
            if (!id) return alert('Invalid Link');
            
            input.value = '';
            const meta = await app.fetchMetadata(id);
            const newVideo = { id, ...meta, category: categorize(meta.title), desc: "User imported video.", addedAt: new Date().toISOString() };
            
            if (store.lessons.find(l => l.id === id)) return alert("Video already exists!");
            store.lessons.unshift(newVideo);
            store.saveLessons();
            app.renderPlaylist();
            app.loadVideo(0);
        },

        fetchMetadata: async (id) => {
            try {
                const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
                const data = await res.json();
                return { title: data.title || `Video ${id}`, thumb: data.thumbnail_url || `https://img.youtube.com/vi/${id}/mqdefault.jpg`, channel: data.author_name || "Unknown" };
            } catch (e) {
                return { title: `Imported Video ${id}`, thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`, channel: "Unknown" };
            }
        },

        insertTimestamp() {
            if (player && player.getCurrentTime) {
                const time = Math.floor(player.getCurrentTime());
                const mins = Math.floor(time / 60).toString().padStart(2, '0');
                const secs = (time % 60).toString().padStart(2, '0');
                const ts = `[${mins}:${secs}]`;
                const noteInput = document.getElementById('notes-input');
                noteInput.setRangeText(ts, noteInput.selectionStart, noteInput.selectionEnd);
                store.setNotes(currentVideoId, noteInput.value);
            }
        },

        shareWhatsapp() {
            const text = `Watch this lesson: ${store.lessons.find(l=>l.id===currentVideoId).title} ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        },
        copyLink() { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?id=${currentVideoId}`).then(() => alert("Copied!")); },
        clearNotes() { document.getElementById('notes-input').value = ''; store.setNotes(currentVideoId, ''); },
        downloadNotes() { const blob = new Blob([document.getElementById('notes-input').value], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Notes.txt`; a.click(); },
        resumeWatching() { const t = store.getResume(currentVideoId); if(t > 0 && player) player.seekTo(t); },
        
        exportData() {
            const data = JSON.stringify(store.lessons, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'math_backup.json';
            a.click();
        },
        importData(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        imported.forEach(vid => {
                            if(!store.lessons.find(l => l.id === vid.id)) store.lessons.unshift(vid);
                        });
                        store.saveLessons();
                        app.renderPlaylist();
                        alert(`Restored ${imported.length} lessons.`);
                    }
                } catch (err) { alert('Invalid backup file'); }
            };
            reader.readAsText(file);
        },

        toggleTheme() {
            const body = document.body;
            const isLight = body.getAttribute('data-theme') === 'light';
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        },
        toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('sidebar-overlay').classList.toggle('active');
        },
        
        showUnavailable(id) {
            document.getElementById('video-details').innerHTML = `<div class="video-details unavailable"><h2>Video Unavailable</h2><p>The video ID "<strong>${id}</strong>" is not in your library.</p><button class="set-btn set-full" onclick="window.history.back()">Go Back</button></div>`;
            document.querySelector('.player-wrapper').innerHTML = '';
            app.showSkeleton(false);
        },

        handleKeydown(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); if(player) player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo(); }
            if (e.code === 'ArrowRight') app.loadVideo(currentVideoIndex + 1);
            if (e.code === 'ArrowLeft') app.loadVideo(currentVideoIndex - 1);
            if (e.code === 'KeyF') app.toggleSettings(); // F for settings
        }
    };

    // Helper
    const categorize = (title) => {
        const t = title.toLowerCase();
        if (t.includes('log') || t.includes('ln') || t.includes('exponential')) return 'Functions';
        if (t.includes('sin') || t.includes('cos') || t.includes('tan') || t.includes('trigonometry')) return 'Trigonometry';
        if (t.includes('equation') || t.includes('algebra') || t.includes('identity') || t.includes('indices')) return 'Algebra';
        if (t.includes('calculus') || t.includes('limit') || t.includes('derivative')) return 'Calculus';
        if (t.includes('probability') || t.includes('stat') || t.includes('data')) return 'Statistics';
        if (t.includes('geometry') || t.includes('angle')) return 'Geometry';
        if (t.includes('graph') || t.includes('plot')) return 'Graphing';
        if (t.includes('vector')) return 'Vectors';
        return 'Foundations';
    };

    window.onload = app.init;
</script>
</body>
</html>
