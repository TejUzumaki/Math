<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajet Math Portal | Advanced Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --accent: #ffffff;
            --muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Navigation --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.4rem;
        }

        .brand span { color: var(--muted); font-weight: 400; }

        /* --- Main Layout --- */
        .portal-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- Video Stage --- */
        .video-stage {
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #1a1a1a 0%, #0a0a0a 100%);
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-details {
            margin-top: 30px;
        }

        .video-details h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .video-details p {
            color: var(--muted);
            max-width: 800px;
            line-height: 1.8;
        }

        /* --- Sidebar --- */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px 24px 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .playlist-item {
            padding: 20px 24px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .playlist-item.active {
            background: rgba(255,255,255,0.07);
            border-left: 4px solid var(--accent);
        }

        .thumbnail-mini {
            width: 100px;
            height: 60px;
            background: #222;
            border-radius: 6px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .item-info .title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .item-info .duration {
            font-size: 0.8rem;
            color: var(--muted);
        }

        @media (max-width: 1100px) {
            .portal-container { grid-template-columns: 1fr; }
            .sidebar { height: 400px; border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">ALVEDEON <span>ACADEMY</span></div>
        <div style="font-size: 0.8rem; font-weight: 600;">GRADE 11 • MATHEMATICS</div>
    </header>

    <div class="portal-container">
        <main class="video-stage">
            <div class="player-wrapper">
                <iframe id="main-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="active-title">Loading Lesson...</h1>
                <p id="active-desc">Select a topic from the sidebar to begin your study session.</p>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-header">Core Curriculum</div>
            <div id="playlist-container">
                </div>
        </aside>
    </div>

    <script>
        const lessons = [
            {
                id: "NGkOTBhmuUM",
                title: "Trigonometry (11th Standard)",
                desc: "A deep dive into trigonometric functions, unit circles, and standard identities essential for 11th-grade mastery.",
                thumb: "https://img.youtube.com/vi/NGkOTBhmuUM/mqdefault.jpg"
            },
            {
                id: "0OPdetFucTU",
                title: "Algebraic Identities & Indices",
                desc: "Mastering the foundations of algebra: working with indices, powers, and essential expansion identities.",
                thumb: "https://img.youtube.com/vi/0OPdetFucTU/mqdefault.jpg"
            },
            {
                id: "P-jyp-CdFfo",
                title: "Logarithmic Functions",
                desc: "Comprehensive guide to logs, including laws of logarithms and their applications in solving complex equations.",
                thumb: "https://img.youtube.com/vi/P-jyp-CdFfo/mqdefault.jpg"
            },
            {
                id: "VyZ0iRwsVbQ",
                title: "Radian & Degree Conversion",
                desc: "Understanding angular measurement systems and how to fluidly convert between radians and degrees.",
                thumb: "https://img.youtube.com/vi/VyZ0iRwsVbQ/mqdefault.jpg"
            },
            {
                id: "videoseries?list=PLMSVGkeYgIbg90-MfgtooDIapK4kG3elz",
                title: "Class 11th Basics Playlist",
                desc: "Complete foundations series covering all necessary prerequisites for the 11th-grade mathematics syllabus.",
                thumb: "https://img.youtube.com/vi/fDjLmYlweUA/mqdefault.jpg" // Placeholder thumb
            }
        ];

        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('active-title');
        const descEl = document.getElementById('active-desc');
        const container = document.getElementById('playlist-container');

        function loadVideo(index) {
            const video = lessons[index];
            player.src = `https://www.youtube.com/embed/${video.id}?rel=0&autoplay=1`;
            titleEl.innerText = video.title;
            descEl.innerText = video.desc;

            // Update UI
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                item.classList.toggle('active', idx === index);
            });
        }

        lessons.forEach((video, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerHTML = `
                <div class="thumbnail-mini" style="background-image: url('${video.thumb}')"></div>
                <div class="item-info">
                    <span class="title">${video.title}</span>
                    <span class="duration">Lesson ${index + 1}</span>
                </div>
            `;
            item.onclick = () => loadVideo(index);
            container.appendChild(item);
        });

        // Load first video by default
        loadVideo(0);
    </script>
</body>
</html>
