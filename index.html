<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajet Math Portal | Advanced Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- THEME PALETTE (Academic Dark) --- */
            --bg: #050505;
            --surface: #0f0f11;
            --surface-hover: #1a1a1d;
            --primary: #6366f1; /* Indigo */
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent: #ffffff;
            --muted: #8b8b93;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 12px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
            outline: none;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Math Grid Background Pattern */
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- Navigation --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.5rem;
            color: white;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .brand span { color: var(--muted); font-weight: 500; font-size: 1rem; margin-left: 4px; }

        .badge-header {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--muted);
            background: rgba(255,255,255,0.03);
        }

        /* --- Main Layout --- */
        .portal-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- Video Stage --- */
        .video-stage {
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center; /* Center content horizontally */
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: var(--radius);
            box-shadow: 0 25px 60px -10px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-details {
            width: 100%;
            max-width: 1000px;
            margin-top: 30px;
        }

        .video-details h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .video-details p {
            color: var(--muted);
            max-width: 800px;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* --- Sidebar --- */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Container fixed, inner scrolls */
        }

        .sidebar-header {
            padding: 24px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(0,0,0,0.2);
        }

        .playlist-container {
            overflow-y: auto;
            flex: 1;
        }

        .playlist-item {
            padding: 20px 24px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            display: flex;
            gap: 16px;
            align-items: center;
            position: relative;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .playlist-item.active {
            background: rgba(99, 102, 241, 0.05);
            border-left: 3px solid var(--primary);
        }
        
        /* Active Indicator Dot */
        .playlist-item.active::before {
            content: '';
            position: absolute;
            right: 24px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .thumbnail-mini {
            width: 110px;
            height: 65px;
            background: #222;
            border-radius: 8px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
            position: relative;
        }
        
        .thumbnail-mini::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .item-info {
            flex: 1;
        }

        .item-info .title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            line-height: 1.4;
            color: #e1e1e1;
        }
        
        .playlist-item.active .item-info .title {
            color: var(--primary);
        }

        .item-info .duration {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @media (max-width: 1100px) {
            .portal-container { grid-template-columns: 1fr; }
            .sidebar { height: 400px; border-left: none; border-top: 1px solid var(--border); }
            .player-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-icon">∫</div>
            <div>SAJET <span>MATH</span></div>
        </div>
        <div class="badge-header">Grade 11 • Advanced</div>
    </header>

    <div class="portal-container">
        <main class="video-stage">
            <div class="player-wrapper">
                <iframe id="main-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="active-title">Loading Lesson...</h1>
                <p id="active-desc">Select a topic from sidebar to begin your study session.</p>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-header">Core Curriculum</div>
            <div class="playlist-container" id="playlist-container">
                <!-- Playlist items injected via JS -->
            </div>
        </aside>
    </div>

    <script>
        // --- LOGIC UNTOUCHED AS PER REQUEST ---
        const lessons = [
            {
                id: "NGkOTBhmuUM",
                title: "Trigonometry (11th Standard)",
                desc: "A deep dive into trigonometric functions, unit circles, and standard identities essential for 11th-grade mastery.",
                thumb: "https://img.youtube.com/vi/NGkOTBhmuUM/mqdefault.jpg"
            },
            {
                id: "0OPdetFucTU",
                title: "Algebraic Identities & Indices",
                desc: "Mastering the foundations of algebra: working with indices, powers, and essential expansion identities.",
                thumb: "https://img.youtube.com/vi/0OPdetFucTU/mqdefault.jpg"
            },
            {
                id: "P-jyp-CdFfo",
                title: "Logarithmic Functions",
                desc: "Comprehensive guide to logs, including laws of logarithms and their applications in solving complex equations.",
                thumb: "https://img.youtube.com/vi/P-jyp-CdFfo/mqdefault.jpg"
            },
            {
                id: "VyZ0iRwsVbQ",
                title: "Radian & Degree Conversion",
                desc: "Understanding angular measurement systems and how to fluidly convert between radians and degrees.",
                thumb: "https://img.youtube.com/vi/VyZ0iRwsVbQ/mqdefault.jpg"
            },
            {
                id: "videoseries?list=PLMSVGkeYgIbg90-MfgtooDIapK4kG3elz",
                title: "Class 11th Basics Playlist",
                desc: "Complete foundations series covering all necessary prerequisites for the 11th-grade mathematics syllabus.",
                thumb: "https://img.youtube.com/vi/fDjLmYlweUA/mqdefault.jpg"
            }
        ];

        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('active-title');
        const descEl = document.getElementById('active-desc');
        const container = document.getElementById('playlist-container');

        function loadVideo(index) {
            const video = lessons[index];
            // Logic unchanged, just ensuring autoplay works smoothly
            player.src = `https://www.youtube.com/embed/${video.id}?rel=0&autoplay=1`;
            titleEl.innerText = video.title;
            descEl.innerText = video.desc;

            // Update UI - Logic kept exactly as requested
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                item.classList.toggle('active', idx === index);
            });
        }

        lessons.forEach((video, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            // Added structure for better CSS styling
            item.innerHTML = `
                <div class="thumbnail-mini" style="background-image: url('${video.thumb}')"></div>
                <div class="item-info">
                    <span class="title">${video.title}</span>
                    <span class="duration">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                        Lesson ${index + 1}
                    </span>
                </div>
            `;
            item.onclick = () => loadVideo(index);
            container.appendChild(item);
        });

        // Load first video by default
        loadVideo(0);
    </script>
</body>
</html>
