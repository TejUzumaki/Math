<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATH | Advanced Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b; --surface: #141416; --surface-2: #1c1c1f; --surface-hover: #27272a;
            --primary: #818cf8; --primary-dim: rgba(129,140,248,0.12); --primary-glow: rgba(129,140,248,0.2);
            --accent: #fafafa; --muted: #a1a1aa; --muted-dim: #71717a;
            --border: rgba(255,255,255,0.06); --border-focus: rgba(129,140,248,0.4);
            --success: #34d399; --success-dim: rgba(52,211,153,0.12);
            --error: #f87171; --error-dim: rgba(248,113,113,0.12);
            --warning: #fbbf24; --radius: 12px; --radius-sm: 8px;
            --font: 'Plus Jakarta Sans', sans-serif;
            --header-bg: rgba(9,9,11,0.88); --shadow-lg: 0 25px 60px -12px rgba(0,0,0,0.7);
        }
        [data-theme="light"] {
            --bg: #f4f4f5; --surface: #ffffff; --surface-2: #f4f4f5; --surface-hover: #e4e4e7;
            --primary: #4f46e5; --primary-dim: rgba(79,70,229,0.08); --primary-glow: rgba(79,70,229,0.15);
            --accent: #18181b; --muted: #71717a; --muted-dim: #a1a1aa;
            --border: rgba(0,0,0,0.07); --border-focus: rgba(79,70,229,0.4);
            --success: #059669; --success-dim: rgba(5,150,105,0.08);
            --error: #dc2626; --error-dim: rgba(220,38,38,0.08);
            --header-bg: rgba(244,244,245,0.88); --shadow-lg: 0 25px 60px -12px rgba(0,0,0,0.12);
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; font-family:var(--font); outline:none; -webkit-tap-highlight-color:transparent; }
        body {
            background:var(--bg); color:var(--accent); height:100vh; height:100dvh;
            display:flex; flex-direction:column; overflow:hidden; transition: background-color .35s, color .35s;
            background-image: radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
            background-size: 32px 32px;
        }

        /* ── Toast ── */
        .toast-wrap { position:fixed; top:76px; right:20px; z-index:10000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { padding:12px 20px; border-radius:var(--radius-sm); font-size:.875rem; font-weight:600; color:#fff;
            transform:translateX(140%); transition:transform .35s cubic-bezier(.22,1,.36,1), opacity .3s; opacity:0; pointer-events:auto;
            backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); }
        .toast.show { transform:translateX(0); opacity:1; }
        .toast-info { background:rgba(79,70,229,0.92); }
        .toast-success { background:rgba(5,150,105,0.92); }
        .toast-error { background:rgba(220,38,38,0.92); }

        /* ── Header ── */
        header {
            padding:0 20px; height:60px; display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid var(--border); background:var(--header-bg); backdrop-filter:blur(24px);
            z-index:100; position:relative; flex-shrink:0; transition: background .35s;
        }
        .brand { display:flex; align-items:center; gap:11px; }
        .brand-mark {
            width:34px; height:34px; background:linear-gradient(135deg, var(--primary), #6366f1);
            color:#fff; border-radius:9px; display:flex; align-items:center; justify-content:center;
            font-family:'Times New Roman',serif; font-size:1.35rem; font-style:italic;
            box-shadow:0 0 24px var(--primary-glow); transition: box-shadow .3s;
        }
        .brand-text { font-weight:800; font-size:1.25rem; letter-spacing:-.3px; color:var(--accent); }
        .brand-sub { font-weight:400; font-size:.75rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-left:2px; }
        .hdr-actions { display:flex; gap:6px; align-items:center; }
        .icon-btn {
            width:38px; height:38px; background:var(--surface); border:1px solid var(--border); color:var(--muted);
            border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition: all .2s; flex-shrink:0;
        }
        .icon-btn:hover { background:var(--surface-hover); color:var(--accent); border-color:var(--border-focus); }
        .icon-btn:focus-visible { box-shadow:0 0 0 2px var(--primary); }
        .icon-btn svg { width:18px; height:18px; }
        .kbd-hint {
            font-size:.65rem; font-weight:600; color:var(--muted-dim); background:var(--surface-2);
            padding:2px 6px; border-radius:4px; border:1px solid var(--border); letter-spacing:.5px; display:none;
        }

        /* ── Layout ── */
        .portal { display:grid; grid-template-columns:1fr 360px; flex:1; overflow:hidden; position:relative; }

        /* ── Video Stage ── */
        .stage { padding:32px 40px; overflow-y:auto; display:flex; flex-direction:column; align-items:center; }
        .player-wrap {
            position:relative; width:100%; max-width:960px; padding-bottom:56.25%; height:0;
            background:#000; border-radius:var(--radius); overflow:hidden;
            box-shadow:var(--shadow-lg), 0 0 0 1px var(--border); transition: box-shadow .5s;
        }
        .player-wrap.is-playing {
            box-shadow:var(--shadow-lg), 0 0 0 1px var(--primary-glow), 0 0 80px -20px var(--primary-glow);
        }
        .player-wrap #main-player { position:absolute; inset:0; width:100%; height:100%; }

        /* Skeleton */
        .skeleton {
            position:absolute; inset:0; background:linear-gradient(135deg,#0d0d0f,#111113);
            z-index:10; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px;
        }
        .skeleton.active { display:flex; }
        .spinner { width:36px; height:36px; border:3px solid #222; border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
        .skeleton-text { font-size:.8rem; color:var(--muted-dim); font-weight:500; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Error overlay inside player */
        .player-error {
            position:absolute; inset:0; z-index:12; background:var(--surface);
            display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:32px;
        }
        .player-error.active { display:flex; }
        .player-error-icon { font-size:3rem; opacity:.4; }
        .player-error h3 { font-size:1.2rem; font-weight:700; color:var(--accent); }
        .player-error p { font-size:.9rem; color:var(--muted); max-width:320px; }

        /* Video details */
        .vid-details { width:100%; max-width:960px; margin-top:24px; }
        .vid-title-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .vid-title { font-size:1.65rem; font-weight:700; letter-spacing:-.5px; line-height:1.25; flex:1; }
        .resume-btn {
            padding:7px 16px; background:var(--primary-dim); color:var(--primary); border:1px solid var(--border-focus);
            border-radius:var(--radius-sm); cursor:pointer; font-size:.8rem; font-weight:700;
            display:none; align-items:center; gap:6px; transition:all .2s; white-space:nowrap;
        }
        .resume-btn.visible { display:inline-flex; }
        .resume-btn:hover { background:var(--primary); color:#fff; }
        .vid-desc { color:var(--muted); line-height:1.65; font-size:.95rem; margin-top:10px; max-width:720px; }

        /* Share toolbar */
        .share-bar { display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; }
        .share-btn {
            flex:1; min-width:110px; padding:10px 14px; background:var(--surface); border:1px solid var(--border);
            color:var(--muted); border-radius:var(--radius-sm); cursor:pointer; font-size:.82rem; font-weight:600;
            display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s;
        }
        .share-btn:hover { background:var(--surface-hover); color:var(--accent); border-color:var(--border-focus); }
        .share-btn:focus-visible { box-shadow:0 0 0 2px var(--primary); }

        /* Notes */
        .notes-card {
            background:var(--surface); padding:20px; border-radius:var(--radius); border:1px solid var(--border);
            margin-top:20px; width:100%; max-width:960px; transition: border-color .3s;
        }
        .notes-card:focus-within { border-color:var(--border-focus); }
        .notes-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .notes-label { font-size:1rem; font-weight:700; }
        .notes-actions { display:flex; gap:4px; }
        .note-btn {
            background:transparent; border:none; color:var(--primary); cursor:pointer;
            font-size:.8rem; font-weight:600; padding:6px 10px; border-radius:6px; transition:background .2s;
        }
        .note-btn:hover { background:var(--primary-dim); }
        #notes-input {
            width:100%; min-height:110px; background:var(--surface-2); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--accent); padding:14px 16px;
            font-family:'Courier New',monospace; resize:vertical; font-size:.9rem; line-height:1.6;
            transition:border-color .3s, background .3s;
        }
        #notes-input:focus { border-color:var(--primary); background:var(--bg); }
        #notes-input::placeholder { color:var(--muted-dim); }

        /* ── Sidebar ── */
        .sidebar {
            background:var(--surface); border-left:1px solid var(--border);
            display:flex; flex-direction:column; overflow:hidden; transition:transform .35s cubic-bezier(.22,1,.36,1), background .35s;
        }
        .sidebar-top { padding:16px 20px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .sidebar-label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; }
        .search-wrap { position:relative; }
        .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted-dim); width:16px; height:16px; pointer-events:none; }
        .search-input {
            width:100%; padding:11px 14px 11px 38px; border-radius:var(--radius-sm);
            border:1px solid var(--border); background:var(--surface-2); color:var(--accent);
            font-size:.88rem; transition:border-color .25s, background .25s;
        }
        .search-input:focus { border-color:var(--primary); background:var(--bg); }
        .search-input::placeholder { color:var(--muted-dim); }

        /* Continue watching */
        .cw-section { border-bottom:1px solid var(--border); }
        .cw-header {
            padding:12px 20px; font-size:.78rem; font-weight:700; color:var(--warning);
            text-transform:uppercase; letter-spacing:1.5px; display:flex; align-items:center; gap:8px;
            cursor:pointer; background:rgba(251,191,36,0.04);
        }
        .cw-header svg { width:14px; height:14px; transition:transform .25s; }
        .cw-header.collapsed svg { transform:rotate(-90deg); }
        .cw-list { overflow:hidden; transition:max-height .35s ease; max-height:300px; }
        .cw-list.collapsed { max-height:0; }

        /* Playlist */
        .playlist-scroll { flex:1; overflow-y:auto; padding-bottom:80px; }
        .cat-head {
            padding:11px 20px; font-size:.82rem; font-weight:700; color:var(--primary);
            cursor:pointer; border-bottom:1px solid var(--border); display:flex;
            justify-content:space-between; align-items:center;
            background:var(--primary-dim); user-select:none; transition:background .2s;
        }
        .cat-head:hover { background:rgba(129,140,248,0.18); }
        .cat-head .chevron { transition:transform .25s; font-size:.7rem; color:var(--muted); }
        .cat-head.closed .chevron { transform:rotate(-90deg); }
        .cat-body { overflow:hidden; transition:max-height .35s ease; }
        .cat-body.closed { max-height:0 !important; }

        /* Playlist item */
        .pl-item {
            padding:11px 20px; cursor:pointer; border-bottom:1px solid var(--border);
            transition:background .15s; display:flex; gap:12px; align-items:center; position:relative;
        }
        .pl-item:hover { background:var(--surface-hover); }
        .pl-item.active { background:var(--primary-dim); }
        .pl-item.active::before {
            content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
            background:var(--primary); border-radius:0 2px 2px 0;
        }
        .pl-thumb {
            width:88px; height:52px; background:#1a1a1c; border-radius:6px; flex-shrink:0;
            background-size:cover; background-position:center; border:1px solid var(--border);
            position:relative; overflow:hidden;
        }
        .pl-thumb .dur-badge {
            position:absolute; bottom:3px; right:3px; background:rgba(0,0,0,0.82);
            color:#fff; font-size:.6rem; font-weight:700; padding:1px 5px; border-radius:3px;
        }
        .pl-info { flex:1; min-width:0; }
        .pl-title { font-size:.85rem; font-weight:600; line-height:1.35; color:#e4e4e7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .15s; }
        .pl-item.active .pl-title { color:var(--primary); }
        .pl-meta { font-size:.72rem; color:var(--muted-dim); margin-top:3px; display:flex; align-items:center; gap:6px; }
        .pl-meta .done-badge { color:var(--success); font-weight:700; }
        .pl-progress { position:absolute; left:0; bottom:0; height:2px; background:linear-gradient(90deg, var(--success), #6ee7b7); transition:width .4s ease; border-radius:0 1px 1px 0; }

        /* Sidebar overlay (mobile) */
        .sb-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:998; opacity:0; transition:opacity .3s; }
        .sb-overlay.active { display:block; opacity:1; }

        /* Drag handle */
        .sb-handle { display:none; width:36px; height:4px; background:var(--muted-dim); border-radius:2px; margin:10px auto 6px; opacity:.5; }

        /* ── QR Modal ── */
        .modal-bg {
            display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.7);
            backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:20px;
        }
        .modal-bg.active { display:flex; }
        .modal-card {
            background:var(--surface); padding:28px; border-radius:16px; border:1px solid var(--border);
            width:100%; max-width:340px; text-align:center; box-shadow:var(--shadow-lg);
            animation:modalIn .3s cubic-bezier(.22,1,.36,1);
        }
        @keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(8px); } to { opacity:1; transform:none; } }
        .modal-card h3 { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
        .modal-card p { font-size:.8rem; color:var(--muted); margin-bottom:18px; }
        .qr-box { display:inline-flex; padding:12px; background:#fff; border-radius:10px; margin-bottom:20px; }
        .modal-btns { display:flex; gap:8px; }
        .modal-btns .btn-p, .modal-btns .btn-s { flex:1; }
        .btn-p {
            padding:11px 20px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius-sm);
            cursor:pointer; font-weight:700; font-size:.88rem; transition:opacity .2s;
        }
        .btn-p:hover { opacity:.88; }
        .btn-s {
            padding:11px 20px; background:var(--surface-2); color:var(--accent); border:1px solid var(--border);
            border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:.88rem; transition:all .2s;
        }
        .btn-s:hover { background:var(--surface-hover); }

        /* ── Responsive ── */
        @media (max-width:1024px) {
            .portal { grid-template-columns:1fr 300px; }
            .stage { padding:24px; }
            .kbd-hint { display:inline-block; }
        }
        @media (max-width:768px) {
            .portal { display:block; overflow:hidden; }
            .sidebar {
                position:fixed; top:auto; bottom:0; left:0; right:0; width:100%;
                max-height:82vh; border-radius:16px 16px 0 0; border-top:1px solid var(--border);
                border-left:none; transform:translateY(100%); z-index:999;
            }
            .sidebar.open { transform:translateY(0); }
            .sb-handle { display:block; }
            .stage { padding:0; height:auto; flex:1; overflow:hidden; }
            .player-wrap { border-radius:0; border:none; box-shadow:none; }
            .player-wrap.is-playing { box-shadow:none; }
            .vid-details { padding:16px; margin-top:12px; }
            .vid-title { font-size:1.2rem; }
            .notes-card { display:none; }
            .share-bar { gap:6px; }
            .share-btn { min-width:0; flex:1; padding:9px 8px; font-size:.75rem; }
            .brand-sub { display:none; }
            .kbd-hint { display:none; }
        }
        @media (max-width:400px) {
            .share-bar { flex-wrap:wrap; }
            .share-btn { min-width:calc(50% - 4px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--surface-hover); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--muted-dim); }

        /* Reduced motion */
        @media (prefers-reduced-motion:reduce) {
            *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
        }

        /* Focus visible */
        *:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
    </style>
</head>
<body>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap" aria-live="polite"></div>

<!-- Header -->
<header>
    <div class="brand">
        <div class="brand-mark" aria-hidden="true">∑</div>
        <div>
            <div class="brand-text">MATH</div>
            <div class="brand-sub">Advanced</div>
        </div>
    </div>
    <div class="hdr-actions">
        <span class="kbd-hint" id="kbd-hint">Space / Arrow keys</span>
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle theme">
            <svg id="theme-icon-dark" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg id="theme-icon-light" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="mobile-menu-btn" aria-label="Open playlist" title="Open playlist" style="display:none">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
    </div>
</header>

<!-- Sidebar overlay (mobile) -->
<div class="sb-overlay" id="sb-overlay"></div>

<!-- Main layout -->
<div class="portal">
    <main class="stage" id="stage">
        <div class="player-wrap" id="player-wrap">
            <div class="skeleton" id="skeleton">
                <div class="spinner"></div>
                <div class="skeleton-text">Loading video...</div>
            </div>
            <div class="player-error" id="player-error">
                <div class="player-error-icon">&#9888;</div>
                <h3>Video Unavailable</h3>
                <p id="error-msg">This video could not be loaded.</p>
                <button class="btn-p" style="margin-top:8px" onclick="window.history.back()">Go Back</button>
            </div>
            <div id="main-player"></div>
        </div>

        <div class="vid-details">
            <div class="vid-title-row">
                <h1 class="vid-title" id="vid-title">Select a Lesson</h1>
                <button class="resume-btn" id="resume-btn" aria-label="Resume from saved position">&#8617; Resume</button>
            </div>
            <p class="vid-desc" id="vid-desc">Browse the playlist to start learning.</p>

            <div class="share-bar">
                <button class="share-btn" id="btn-copy" aria-label="Copy video link">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copy Link
                </button>
                <button class="share-btn" id="btn-qr" aria-label="Show QR code">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/></svg>
                    QR Code
                </button>
                <button class="share-btn" id="btn-wa" aria-label="Share on WhatsApp">
                    <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.611.611l4.458-1.495A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.94 9.94 0 01-5.39-1.587l-.382-.227-2.646.887.887-2.646-.227-.382A9.94 9.94 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                    WhatsApp
                </button>

                        <button class="note-btn" id="btn-clear" aria-label="Clear notes">Clear</button>
                        <button class="note-btn" id="btn-export" aria-label="Export notes">Export .txt</button>
                    </div>

                <textarea id="notes-input" placeholder="Type your notes here... (auto-saved)" aria-label="Video notes"></textarea>

    <aside class="sidebar" id="sidebar" role="complementary" aria-label="Lesson playlist">
        <div class="sb-handle" id="sb-handle"></div>
        <div class="sidebar-top">
            <div class="sidebar-label">Curriculum</div>
            <div class="search-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search lessons..." aria-label="Search lessons">
            </div>

        <div class="cw-section" id="cw-section" style="display:none">
            <div class="cw-header" id="cw-header">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                Continue Watching
            </div>
            <div class="cw-list" id="cw-list"></div>

        <div class="playlist-scroll" id="playlist-scroll"></div>

</div>

<!-- QR Modal -->
<div class="modal-bg" id="qr-modal" role="dialog" aria-modal="true" aria-label="QR Code">
    <div class="modal-card">
        <h3>Scan to Watch</h3>
        <p>Open on another device</p>
        <div class="qr-box" id="qr-box"></div>
        <div class="modal-btns">
            <button class="btn-p" id="btn-dl-qr">Download</button>
            <button class="btn-s" id="btn-close-qr">Close</button>
        </div>
    </div>
</div>

<script>
/* ================================================================
   DATA LAYER — localStorage-backed store
   ================================================================ */
const store = {
    lessons: [
        { id:"fbZWRiV1wkc", title:"Number Systems", category:"Foundations", desc:"Understanding real numbers, integers, and number sets.", thumb:"https://img.youtube.com/vi/fbZWRiV1wkc/mqdefault.jpg" },
        { id:"0OPdetFucTU", title:"Algebraic Identities", category:"Algebra", desc:"Mastering indices, powers, and expansion formulas.", thumb:"https://img.youtube.com/vi/0OPdetFucTU/mqdefault.jpg" },
        { id:"9ZmkBIwlWrA", title:"Advanced Algebra", category:"Algebra", desc:"Complex quadratic equations and inequalities.", thumb:"https://img.youtube.com/vi/9ZmkBIwlWrA/mqdefault.jpg" },
        { id:"JOVXMSJy3CQ", title:"Calculus Limits", category:"Calculus", desc:"Limits, continuity, and derivatives.", thumb:"https://img.youtube.com/vi/JOVXMSJy3CQ/mqdefault.jpg" },
        { id:"VUm3AZffkto", title:"Geometry Basics", category:"Geometry", desc:"Properties of triangles, circles, and polygons.", thumb:"https://img.youtube.com/vi/VUm3AZffkto/mqdefault.jpg" },
        { id:"3LaUDn3eMRA", title:"Vector Algebra", category:"Vectors", desc:"Magnitude, direction, and dot products.", thumb:"https://img.youtube.com/vi/3LaUDn3eMRA/mqdefault.jpg" },
        { id:"P-jyp-CdFfo", title:"Logarithmic Functions", category:"Functions", desc:"Laws of logarithms and their applications.", thumb:"https://img.youtube.com/vi/P-jyp-CdFfo/mqdefault.jpg" },
        { id:"VyZ0iRwsVbQ", title:"Radian and Degree", category:"Trigonometry", desc:"Angular measurement systems and conversion.", thumb:"https://img.youtube.com/vi/VyZ0iRwsVbQ/mqdefault.jpg" },
        { id:"NGkOTBhmuUM", title:"Trigonometry", category:"Trigonometry", desc:"Core concepts: Sin, Cos, Tan and identities.", thumb:"https://img.youtube.com/vi/NGkOTBhmuUM/mqdefault.jpg" },
        { id:"1NSNJxJq3XY", title:"Probability", category:"Statistics", desc:"Basics of chance and theoretical probability.", thumb:"https://img.youtube.com/vi/1NSNJxJq3XY/mqdefault.jpg" },
        { id:"0aC6sBc5Q-A", title:"Statistics", category:"Statistics", desc:"Mean, mode, median and data interpretation.", thumb:"https://img.youtube.com/vi/0aC6sBc5Q-A/mqdefault.jpg" },
        { id:"1-GvYG1p0iI", title:"Graphing", category:"Graphing", desc:"Plotting linear and quadratic equations.", thumb:"https://img.youtube.com/vi/1-GvYG1p0iI/mqdefault.jpg" },
        { id:"8Z3Gz4DT7X8", title:"Number Theory", category:"Foundations", desc:"Prime numbers, factors, and multiples.", thumb:"https://img.youtube.com/vi/8Z3Gz4DT7X8/mqdefault.jpg" }
    ],

    _get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
    _set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },

    getProgress(id)   { return parseInt(localStorage.getItem('prog_' + id) || '0', 10); },
    setProgress(id, v){ localStorage.setItem('prog_' + id, String(v)); },
    getResume(id)     { return parseFloat(localStorage.getItem('resume_' + id) || '0'); },
    setResume(id, v)  { localStorage.setItem('resume_' + id, String(v)); },
    getNotes(id)      { return localStorage.getItem('notes_' + id) || ''; },
    setNotes(id, v)   { localStorage.setItem('notes_' + id, v); },

    getHistory()      { return this._get('watch_history') || []; },
    pushHistory(lesson) {
        let h = this.getHistory().filter(x => x.id !== lesson.id);
        h.unshift({ id:lesson.id, title:lesson.title, thumb:lesson.thumb, category:lesson.category, ts:Date.now() });
        if (h.length > 50) h.length = 50;
        this._set('watch_history', h);
    }
};

/* ================================================================
   YOUTUBE PLAYER — IFrame API
   ================================================================ */
let player = null;
let playerReady = false;
let pendingLoad = null; // { id, seekTo }

function onYouTubeIframeAPIReady() {
    player = new YT.Player('main-player', {
        height: '100%',
        width: '100%',
        playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
        events: {
            onReady: app._onReady,
            onStateChange: app._onState,
            onError: app._onError
        }
    });
}

// Load the API script
const apiTag = document.createElement('script');
apiTag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(apiTag);

// Fallback: if API never loads
setTimeout(() => {
    if (!playerReady) app.showToast('Video player failed to load. Check your connection.', 'error');
}, 12000);

/* ================================================================
   APP LOGIC
   ================================================================ */
const app = {
    currentId: null,
    currentIndex: -1,
    isLoading: false,
    progressTimer: null,
    skeletonTimer: null,

    /* ── Init ── */
    init() {
        // Theme
        const saved = localStorage.getItem('theme');
        if (saved === 'light') this._applyTheme('light');

        // Mobile detection
        this._checkMobile();
        window.addEventListener('resize', () => this._checkMobile());

        // Event bindings
        document.getElementById('theme-btn').addEventListener('click', () => this.toggleTheme());
        document.getElementById('mobile-menu-btn').addEventListener('click', () => this.toggleSidebar());
        document.getElementById('sb-overlay').addEventListener('click', () => this.closeSidebar());
        document.getElementById('sb-handle').addEventListener('click', () => this.closeSidebar());
        document.getElementById('search-input').addEventListener('input', (e) => this.renderPlaylist(e.target.value));
        document.getElementById('notes-input').addEventListener('input', (e) => {
            if (this.currentId) store.setNotes(this.currentId, e.target.value);
        });
        document.getElementById('resume-btn').addEventListener('click', () => this.resumeWatching());
        document.getElementById('btn-copy').addEventListener('click', () => this.copyLink());
        document.getElementById('btn-qr').addEventListener('click', () => this.openQR());
        document.getElementById('btn-wa').addEventListener('click', () => this.shareWhatsApp());
        document.getElementById('btn-ts').addEventListener('click', () => this.insertTimestamp());
        document.getElementById('btn-clear').addEventListener('click', () => this.clearNotes());
        document.getElementById('btn-export').addEventListener('click', () => this.exportNotes());
        document.getElementById('btn-close-qr').addEventListener('click', () => this.closeQR());
        document.getElementById('btn-dl-qr').addEventListener('click', () => this.downloadQR());
        document.getElementById('qr-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) this.closeQR(); });
        document.getElementById('cw-header').addEventListener('click', () => this._toggleCW());

        // Keyboard
        document.addEventListener('keydown', (e) => this._onKey(e));

        // Router
        window.addEventListener('popstate', () => this._route());
        this._route();
    },

    /* ── Router ── */
    _route() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            const idx = store.lessons.findIndex(l => l.id === id);
            if (idx !== -1) {
                this.loadVideo(idx, false);
                return;
            }
            this._showError('The video "' + id + '" is not in your lesson library.');
            this.renderPlaylist();
            return;
        }
        this.renderPlaylist();
        this.renderContinueWatching();
        // Load first video by default
        if (store.lessons.length > 0) this.loadVideo(0, false);
    },

    /* ── Load Video ── */
    loadVideo(index, pushState = true) {
        if (index < 0 || index >= store.lessons.length) return;
        const video = store.lessons[index];
        this.currentId = video.id;
        this.currentIndex = index;

        // URL
        if (pushState) {
            const url = window.location.pathname + '?id=' + video.id;
            window.history.pushState({ path: url }, '', url);
        }

        // Hide any previous error
        document.getElementById('player-error').classList.remove('active');

        // Show skeleton
        this._showSkeleton(true);

        // Update sidebar active state
        document.querySelectorAll('.pl-item.active').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById('pl-' + index);
        if (activeEl) {
            activeEl.classList.add('active');
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Update details
        document.getElementById('vid-title').textContent = video.title;
        document.getElementById('vid-desc').textContent = video.desc;
        document.getElementById('notes-input').value = store.getNotes(video.id);

        // Resume button
        const resumeTime = store.getResume(video.id);
        document.getElementById('resume-btn').classList.toggle('visible', resumeTime > 5);

        // Player glow off until playing
        document.getElementById('player-wrap').classList.remove('is-playing');

        // Load video in player
        if (playerReady && player && player.loadVideoById) {
            player.loadVideoById(video.id);
            if (resumeTime > 5) {
                // Seek after a short delay so loadVideoById completes
                setTimeout(() => {
                    if (player && player.seekTo) player.seekTo(resumeTime, true);
                }, 600);
            }
        } else {
            // Player not ready yet — queue the load
            pendingLoad = { id: video.id, seekTo: resumeTime > 5 ? resumeTime : 0 };
        }

        // Save to history
        store.pushHistory(video);
        this.renderContinueWatching();

        // Close sidebar on mobile
        if (window.innerWidth <= 768) this.closeSidebar();
    },

    /* ── Player Events ── */
    _onReady(e) {
        playerReady = true;
        // If there was a pending load, execute it now
        if (pendingLoad) {
            player.loadVideoById(pendingLoad.id);
            if (pendingLoad.seekTo > 0) {
                setTimeout(() => { if (player.seekTo) player.seekTo(pendingLoad.seekTo, true); }, 600);
            }
            pendingLoad = null;
        }
        // If no video loaded yet, trigger route
        if (!app.currentId) app._route();
        // Hide skeleton if it's showing for initial load
        if (app.isLoading) app._showSkeleton(false);
    },

    _onState(e) {
        const data = e.data;

        // Hide skeleton when video actually starts playing or is cued
        if ((data === YT.PlayerState.PLAYING || data === YT.PlayerState.CUED) && app.isLoading) {
            app._showSkeleton(false);
        }

        // Playing glow
        const wrap = document.getElementById('player-wrap');
        if (data === YT.PlayerState.PLAYING) {
            wrap.classList.add('is-playing');
            // Start progress tracking
            app._startProgressTracking();
        } else {
            if (data !== YT.PlayerState.BUFFERING) wrap.classList.remove('is-playing');
            if (data !== YT.PlayerState.PLAYING) app._stopProgressTracking();
        }

        // Video ended
        if (data === YT.PlayerState.ENDED) {
            wrap.classList.remove('is-playing');
            app._stopProgressTracking();
            // Set 100%
            store.setProgress(app.currentId, 100);
            app._updateProgressDOM(app.currentId, 100);
            // Auto-next
            if (app.currentIndex < store.lessons.length - 1) {
                app.showToast('Starting next lesson...', 'info');
                app.loadVideo(app.currentIndex + 1);
            } else {
                app.showToast('You have completed the playlist!', 'success');
            }
        }
    },

    _onError(e) {
        app._showSkeleton(false);
        document.getElementById('player-wrap').classList.remove('is-playing');
        if (app.currentId) {
            app._showError('This video could not be loaded. It may be private, deleted, or unavailable in your region.');
        }
    },

    /* ── Progress Tracking ── */
    _startProgressTracking() {
        this._stopProgressTracking();
        this.progressTimer = setInterval(() => {
            if (!player || !player.getCurrentTime || !this.currentId) return;
            const dur = player.getDuration();
            const cur = player.getCurrentTime();
            if (dur > 0) {
                const pct = Math.min(100, Math.floor((cur / dur) * 100));
                store.setProgress(this.currentId, pct);
                store.setResume(this.currentId, cur);
                this._updateProgressDOM(this.currentId, pct);
            }
        }, 2000);
    },
    _stopProgressTracking() {
        if (this.progressTimer) { clearInterval(this.progressTimer); this.progressTimer = null; }
    },

    _updateProgressDOM(id, pct) {
        const idx = store.lessons.findIndex(l => l.id === id);
        if (idx === -1) return;
        // Playlist item
        const el = document.getElementById('pl-' + idx);
        if (el) {
            const bar = el.querySelector('.pl-progress');
            if (bar) bar.style.width = pct + '%';
            const meta = el.querySelector('.pl-meta');
            if (meta) meta.innerHTML = pct >= 80
                ? '<span class="done-badge">&#10003; Completed</span>'
                : pct + '% watched';
        }
        // Continue watching items (by id)
        document.querySelectorAll('.cw-item[data-id="' + id + '"]').forEach(cel => {
            const bar = cel.querySelector('.pl-progress');
            if (bar) bar.style.width = pct + '%';
            const meta = cel.querySelector('.pl-meta');
            if (meta) meta.textContent = pct + '% watched';
        });
    },

    /* ── Skeleton ── */
    _showSkeleton(show) {
        const el = document.getElementById('skeleton');
        if (show) {
            el.classList.add('active');
            this.isLoading = true;
            // Safety timeout
            if (this.skeletonTimer) clearTimeout(this.skeletonTimer);
            this.skeletonTimer = setTimeout(() => {
                if (this.isLoading) this._showSkeleton(false);
            }, 12000);
        } else {
            el.classList.remove('active');
            this.isLoading = false;
            if (this.skeletonTimer) { clearTimeout(this.skeletonTimer); this.skeletonTimer = null; }
        }
    },

    /* ── Error Display ── */
    _showError(msg) {
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('player-error').classList.add('active');
        this._showSkeleton(false);
        if (player && player.stopVideo) { try { player.stopVideo(); } catch {} }
    },

    /* ── Render Playlist ── */
    renderPlaylist(filter = '') {
        const container = document.getElementById('playlist-scroll');
        container.innerHTML = '';
        const term = filter.toLowerCase().trim();

        const filtered = store.lessons.filter(l =>
            l.title.toLowerCase().includes(term) ||
            l.desc.toLowerCase().includes(term) ||
            l.category.toLowerCase().includes(term)
        );

        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding:32px 20px;text-align:center;color:var(--muted-dim);font-size:.9rem;">No lessons match your search.</div>';
            return;
        }

        const categories = [];
        const catMap = {};
        filtered.forEach(l => {
            if (!catMap[l.category]) { catMap[l.category] = []; categories.push(l.category); }
            catMap[l.category].push(l);
        });

        categories.forEach(cat => {
            const items = catMap[cat];
            const catEl = document.createElement('div');

            const headEl = document.createElement('div');
            headEl.className = 'cat-head';
            headEl.innerHTML = '<span>' + cat + '</span><span class="chevron">&#9660;</span>';
            headEl.addEventListener('click', () => {
                headEl.classList.toggle('closed');
                bodyEl.classList.toggle('closed');
            });
            catEl.appendChild(headEl);

            const bodyEl = document.createElement('div');
            bodyEl.className = 'cat-body';
            // Calculate max-height for smooth animation
            bodyEl.style.maxHeight = (items.length * 76) + 'px';

            items.forEach(video => {
                const idx = store.lessons.indexOf(video);
                const pct = store.getProgress(video.id);
                const itemEl = document.createElement('div');
                itemEl.id = 'pl-' + idx;
                itemEl.className = 'pl-item' + (video.id === this.currentId ? ' active' : '');
                itemEl.setAttribute('role', 'button');
                itemEl.setAttribute('tabindex', '0');
                itemEl.innerHTML =
                    '<div class="pl-progress" style="width:' + pct + '%"></div>' +
                    '<div class="pl-thumb" style="background-image:url(\'' + video.thumb + '\')"></div>' +
                    '<div class="pl-info">' +
                        '<div class="pl-title">' + video.title + '</div>' +
                        '<div class="pl-meta">' + (pct >= 80 ? '<span class="done-badge">&#10003; Completed</span>' : (pct > 0 ? pct + '% watched' : video.category)) + '</div>' +
                    '</div>';
                itemEl.addEventListener('click', () => this.loadVideo(idx));
                itemEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') this.loadVideo(idx); });
                bodyEl.appendChild(itemEl);
            });

            catEl.appendChild(bodyEl);
            container.appendChild(catEl);
        });
    },

    /* ── Continue Watching ── */
    renderContinueWatching() {
        const section = document.getElementById('cw-section');
        const list = document.getElementById('cw-list');
        const history = store.getHistory();

        // Find videos with progress > 0 and < 80
        const inProgress = [];
        const seen = new Set();
        history.forEach(h => {
            if (seen.has(h.id)) return;
            const pct = store.getProgress(h.id);
            if (pct > 0 && pct < 80) {
                seen.add(h.id);
                inProgress.push(h);
            }
        });

        if (inProgress.length === 0) {
            section.style.display = 'none';
            return;
        }

        section.style.display = 'block';
        list.innerHTML = '';

        inProgress.slice(0, 5).forEach(video => {
            const idx = store.lessons.findIndex(l => l.id === video.id);
            if (idx === -1) return;
            const pct = store.getProgress(video.id);
            const el = document.createElement('div');
            el.className = 'pl-item cw-item';
            el.dataset.id = video.id;
            el.setAttribute('role', 'button');
            el.setAttribute('tabindex', '0');
            el.innerHTML =
                '<div class="pl-progress" style="width:' + pct + '%"></div>' +
                '<div class="pl-thumb" style="background-image:url(\'' + (video.thumb || '') + '\')"></div>' +
                '<div class="pl-info">' +
                    '<div class="pl-title">' + video.title + '</div>' +
                    '<div class="pl-meta">' + pct + '% watched</div>' +
                '</div>';
            el.addEventListener('click', () => this.loadVideo(idx));
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') this.loadVideo(idx); });
            list.appendChild(el);
        });
    },

    _toggleCW() {
        document.getElementById('cw-header').classList.toggle('collapsed');
        document.getElementById('cw-list').classList.toggle('collapsed');
    },

    /* ── Sidebar ── */
    toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sb-overlay');
        const isOpen = sb.classList.contains('open');
        if (isOpen) {
            sb.classList.remove('open');
            ov.classList.remove('active');
        } else {
            sb.classList.add('open');
            ov.classList.add('active');
        }
    },
    closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sb-overlay').classList.remove('active');
    },

    /* ── Theme ── */
    toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        this._applyTheme(next);
        localStorage.setItem('theme', next);
    },
    _applyTheme(t) {
        if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('theme-icon-dark').style.display = 'none';
            document.getElementById('theme-icon-light').style.display = 'block';
        } else {
            document.documentElement.removeAttribute('data-theme');
            document.getElementById('theme-icon-dark').style.display = 'block';
            document.getElementById('theme-icon-light').style.display = 'none';
        }
    },

    /* ── Notes ── */
    insertTimestamp() {
        if (!player || !player.getCurrentTime || !this.currentId) return;
        const t = Math.floor(player.getCurrentTime());
        const m = String(Math.floor(t / 60)).padStart(2, '0');
        const s = String(t % 60).padStart(2, '0');
        const stamp = '[' + m + ':' + s + '] ';
        const ta = document.getElementById('notes-input');
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        ta.setRangeText(stamp, start, end, 'end');
        store.setNotes(this.currentId, ta.value);
        ta.focus();
    },
    clearNotes() {
        if (!this.currentId) return;
        document.getElementById('notes-input').value = '';
        store.setNotes(this.currentId, '');
        this.showToast('Notes cleared', 'info');
    },
    exportNotes() {
        if (!this.currentId) return;
        const video = store.lessons.find(l => l.id === this.currentId);
        const title = video ? video.title : 'Unknown';
        const content = 'Notes: ' + title + '\n' + '='.repeat(40) + '\n\n' + document.getElementById('notes-input').value;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = title.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_') + '_notes.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        this.showToast('Notes exported', 'success');
    },

    /* ── Resume ── */
    resumeWatching() {
        if (!this.currentId || !player || !player.seekTo) return;
        const t = store.getResume(this.currentId);
        if (t > 0) {
            player.seekTo(t, true);
            this.showToast('Resumed from ' + this._fmtTime(t), 'info');
        }
    },

    /* ── Sharing ── */
    _videoUrl() {
        return window.location.origin + window.location.pathname + '?id=' + this.currentId;
    },
    copyLink() {
        if (!this.currentId) return;
        navigator.clipboard.writeText(this._videoUrl()).then(() => {
            this.showToast('Link copied to clipboard', 'success');
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = this._videoUrl();
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            this.showToast('Link copied to clipboard', 'success');
        });
    },
    shareWhatsApp() {
        if (!this.currentId) return;
        const video = store.lessons.find(l => l.id === this.currentId);
        const text = 'Watch: ' + (video ? video.title : 'this lesson') + ' ' + this._videoUrl();
        window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    },
    openQR() {
        if (!this.currentId) return;
        const box = document.getElementById('qr-box');
        box.innerHTML = '';
        new QRCode(box, { text: this._videoUrl(), width: 160, height: 160, colorDark: '#18181b', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
        document.getElementById('qr-modal').classList.add('active');
    },
    closeQR() {
        document.getElementById('qr-modal').classList.remove('active');
    },
    downloadQR() {
        const img = document.querySelector('#qr-box img');
        if (!img) return;
        const a = document.createElement('a');
        a.href = img.src;
        a.download = 'math_lesson_qr.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        this.showToast('QR code downloaded', 'success');
    },

    /* ── Keyboard ── */
    _onKey(e) {
        // Skip if typing in input/textarea
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        // Close modal on Escape
        if (e.key === 'Escape') {
            if (document.getElementById('qr-modal').classList.contains('active')) { this.closeQR(); return; }
            if (document.getElementById('sidebar').classList.contains('open')) { this.closeSidebar(); return; }
        }
        if (!player || !player.getPlayerState) return;
        if (e.code === 'Space') {
            e.preventDefault();
            try {
                player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
            } catch {}
        }
        if (e.code === 'ArrowRight') {
            e.preventDefault();
            if (this.currentIndex < store.lessons.length - 1) this.loadVideo(this.currentIndex + 1);
        }
        if (e.code === 'ArrowLeft') {
            e.preventDefault();
            if (this.currentIndex > 0) this.loadVideo(this.currentIndex - 1);
        }
    },

    /* ── Mobile ── */
    _checkMobile() {
        document.getElementById('mobile-menu-btn').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    },

    /* ── Toast ── */
    showToast(msg, type = 'info') {
        const wrap = document.getElementById('toast-wrap');
        const el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.textContent = msg;
        wrap.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 350);
        }, 2800);
    },

    /* ── Utilities ── */
    _fmtTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + String(s).padStart(2, '0');
    }
};

/* ── Boot ── */
window.addEventListener('DOMContentLoaded', app.init.bind(app));
</script>
