<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH | Advanced Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* --- THEME PALETTE (Academic Dark) --- */
            --bg: #050505;
            --surface: #0f0f11;
            --surface-hover: #1a1a1d;
            --primary: #6366f1; /* Indigo */
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent: #ffffff;
            --muted: #8b8b93;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 12px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); outline: none; }
        
        body {
            background-color: var(--bg);
            color: var(--accent);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- Navigation --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.5rem;
            color: white;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .brand span { color: var(--muted); font-weight: 500; font-size: 1rem; margin-left: 4px; }

        .badge-header {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--muted);
            background: rgba(255,255,255,0.03);
        }

        /* --- Main Layout --- */
        .portal-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- Video Stage --- */
        .video-stage {
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: var(--radius);
            box-shadow: 0 25px 60px -10px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .video-details { width: 100%; max-width: 1000px; margin-top: 30px; }

        .video-details h1 {
            font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; line-height: 1.2;
        }

        .video-details p {
            color: var(--muted); max-width: 800px; line-height: 1.7; font-size: 1.05rem;
        }

        /* --- Share Toolbar --- */
        .share-toolbar {
            display: flex; gap: 10px; margin-top: 20px;
        }

        .tool-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--muted); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        /* --- Notes Section --- */
        .notes-section {
            width: 100%; max-width: 1000px; margin-top: 24px;
        }
        .notes-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .notes-title {
            font-size: 1.1rem; font-weight: 700; color: var(--accent);
        }
        .notes-actions { display: flex; gap: 8px; }
        .notes-btn {
            background: transparent; border: none; color: var(--primary);
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .notes-btn:hover { text-decoration: underline; }

        #notes-input {
            width: 100%; min-height: 120px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--accent); padding: 16px;
            font-family: 'Courier New', monospace; resize: vertical; font-size: 0.95rem;
            transition: border 0.3s;
        }
        #notes-input:focus { border-color: var(--primary); }

        /* --- Sidebar --- */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 24px 10px; font-size: 0.8rem; font-weight: 700;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
            background: rgba(0,0,0,0.2);
        }

        /* Search Bar */
        .search-box {
            padding: 10px 24px 20px;
        }
        .search-input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.03);
            color: white; font-size: 0.9rem; transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        .playlist-container { overflow-y: auto; flex: 1; }

        .playlist-item {
            padding: 20px 24px; cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            display: flex; gap: 16px; align-items: center; position: relative;
        }
        .playlist-item:hover { background: rgba(255,255,255,0.02); }
        .playlist-item.active {
            background: rgba(99, 102, 241, 0.05); border-left: 3px solid var(--primary);
        }
        .playlist-item.active::before {
            content: ''; position: absolute; right: 24px; width: 8px; height: 8px;
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);
        }

        .thumbnail-mini {
            width: 110px; height: 65px; background: #222; border-radius: 8px;
            flex-shrink: 0; background-size: cover; background-position: center;
            border: 1px solid var(--border); position: relative;
        }
        .thumbnail-mini::after {
            content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.2); border-radius: 8px;
        }
        .item-info { flex: 1; }
        .item-info .title {
            font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; display: block; line-height: 1.4; color: #e1e1e1;
        }
        .playlist-item.active .item-info .title { color: var(--primary); }
        .item-info .duration {
            font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px;
        }

        /* --- Modal (QR) --- */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal.open { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: var(--surface); padding: 30px; border-radius: 16px;
            border: 1px solid var(--border); width: 320px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        #qrcode {
            display: flex; justify-content: center; margin: 20px 0;
            padding: 10px; background: white; border-radius: 8px; width: fit-content;
            margin-left: auto; margin-right: auto;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-primary {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: 600; cursor: pointer;
        }
        .btn-secondary {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: white; font-weight: 600; cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .portal-container { grid-template-columns: 1fr; }
            .sidebar { height: 400px; border-left: none; border-top: 1px solid var(--border); }
            .player-wrapper { max-width: 100%; }
            .brand span { display: none; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-icon">∑</div>
            <div>MATH</div>
        </div>
        <div class="badge-header">Advanced</div>
    </header>

    <div class="portal-container">
        <main class="video-stage">
            <div class="player-wrapper">
                <iframe id="main-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="active-title">Loading Lesson...</h1>
                <p id="active-desc">Select a topic from sidebar to begin your study session.</p>
                
                <!-- Share Toolbar -->
                <div class="share-toolbar">
                    <button class="tool-btn" onclick="copyLink()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        Copy Link
                    </button>
                    <button class="tool-btn" onclick="openQRModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        QR Code
                    </button>
                    <button class="tool-btn" onclick="openYoutube()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        Open in YouTube
                    </button>
                </div>

                <!-- Notes Section -->
                <div class="notes-section">
                    <div class="notes-header">
                        <div class="notes-title">My Notes</div>
                        <div class="notes-actions">
                            <button class="notes-btn" onclick="clearNotes()">Clear</button>
                            <button class="notes-btn" onclick="downloadNotes()">Download</button>
                        </div>
                    </div>
                    <textarea id="notes-input" placeholder="Type your notes here... (Auto-saved)"></textarea>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-header">Core Curriculum</div>
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="Search lessons...">
            </div>
            <div class="playlist-container" id="playlist-container">
                <!-- Playlist items injected via JS -->
            </div>
        </aside>
    </div>

    <!-- QR Modal -->
    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px;">Scan to Watch</h3>
            <div id="qrcode"></div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="downloadQR()">Download</button>
                <button class="btn-secondary" onclick="closeQRModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA (UNTOUCHED) ---
        const lessons = [
            {
                id: "NGkOTBhmuUM",
                title: "Trigonometry (11th Standard)",
                desc: "A deep dive into trigonometric functions, unit circles, and standard identities essential for 11th-grade mastery.",
                thumb: "https://img.youtube.com/vi/NGkOTBhmuUM/mqdefault.jpg"
            },
            {
                id: "0OPdetFucTU",
                title: "Algebraic Identities & Indices",
                desc: "Mastering the foundations of algebra: working with indices, powers, and essential expansion identities.",
                thumb: "https://img.youtube.com/vi/0OPdetFucTU/mqdefault.jpg"
            },
            {
                id: "P-jyp-CdFfo",
                title: "Logarithmic Functions",
                desc: "Comprehensive guide to logs, including laws of logarithms and their applications in solving complex equations.",
                thumb: "https://img.youtube.com/vi/P-jyp-CdFfo/mqdefault.jpg"
            },
            {
                id: "VyZ0iRwsVbQ",
                title: "Radian & Degree Conversion",
                desc: "Understanding angular measurement systems and how to fluidly convert between radians and degrees.",
                thumb: "https://img.youtube.com/vi/VyZ0iRwsVbQ/mqdefault.jpg"
            },
            {
                id: "videoseries?list=PLMSVGkeYgIbg90-MfgtooDIapK4kG3elz",
                title: "Class 11th Basics Playlist",
                desc: "Complete foundations series covering all necessary prerequisites for 11th-grade mathematics syllabus.",
                thumb: "https://img.youtube.com/vi/fDjLmYlweUA/mqdefault.jpg"
            }
        ];

        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('active-title');
        const descEl = document.getElementById('active-desc');
        const container = document.getElementById('playlist-container');
        const searchInput = document.getElementById('search-input');
        const notesInput = document.getElementById('notes-input');
        const baseUrl = "https://mathxtej.vercel.app";

        let currentVideoId = null;

        // --- CORE LOGIC (UNTOUCHED) ---
        function loadVideo(index) {
            const video = lessons[index];
            currentVideoId = video.id;
            player.src = `https://www.youtube.com/embed/${video.id}?rel=0&autoplay=1`;
            titleEl.innerText = video.title;
            descEl.innerText = video.desc;

            // Update UI
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                item.classList.toggle('active', idx === index);
            });

            // Load Notes
            const savedNotes = localStorage.getItem('notes_' + video.id);
            notesInput.value = savedNotes || "";
        }

        // --- RENDER HELPER (New) ---
        function renderPlaylist(data) {
            container.innerHTML = '';
            data.forEach((video, index) => {
                // Find actual index in main array for loadVideo to work correctly with IDs
                const actualIndex = lessons.findIndex(l => l.id === video.id);
                
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <div class="thumbnail-mini" style="background-image: url('${video.thumb}')"></div>
                    <div class="item-info">
                        <span class="title">${video.title}</span>
                        <span class="duration">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                            Lesson ${actualIndex + 1}
                        </span>
                    </div>
                `;
                item.onclick = () => loadVideo(actualIndex);
                container.appendChild(item);
            });
        }

        // --- FEATURES LOGIC ---

        // 1. Search
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = lessons.filter(l => l.title.toLowerCase().includes(term));
            renderPlaylist(filtered);
        });

        // 2. Notes (Auto-save)
        notesInput.addEventListener('input', (e) => {
            if (currentVideoId) {
                localStorage.setItem('notes_' + currentVideoId, e.target.value);
            }
        });

        function clearNotes() {
            if(confirm("Clear notes for this video?")) {
                notesInput.value = "";
                if (currentVideoId) localStorage.removeItem('notes_' + currentVideoId);
            }
        }

        function downloadNotes() {
            if (!notesInput.value.trim()) {
                alert("No notes to download.");
                return;
            }
            const blob = new Blob([notesInput.value], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Math_Notes_${currentVideoId || 'export'}.txt`;
            a.click();
        }

        // 3. Share & QR
        function copyLink() {
            if (!currentVideoId) return;
            const link = `${baseUrl}/?id=${currentVideoId}`;
            navigator.clipboard.writeText(link).then(() => alert("Link copied to clipboard!"));
        }

        function openYoutube() {
            if (!currentVideoId) return;
            window.open(`https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
        }

        const modal = document.getElementById('qr-modal');
        const qrcodeContainer = document.getElementById('qrcode');

        function openQRModal() {
            if (!currentVideoId) return;
            modal.classList.add('open');
            qrcodeContainer.innerHTML = "";
            new QRCode(qrcodeContainer, {
                text: `${baseUrl}/?id=${currentVideoId}`,
                width: 128,
                height: 128
            });
        }

        function closeQRModal() {
            modal.classList.remove('open');
        }

        function downloadQR() {
            const img = qrcodeContainer.querySelector('img');
            if (img) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = `Math_QR_${currentVideoId}.png`;
                link.click();
            }
        }

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeQRModal();
        });

        // Initial Render
        renderPlaylist(lessons);
        loadVideo(0);
    </script>
</body>
</html>
